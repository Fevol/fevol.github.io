<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Redirecting to obsidian-typings</title>
	<link rel="canonical" href="https://obsidian-typings.github.io/obsidian-typings/" />

	<meta http-equiv="refresh" content="0;url=https://obsidian-typings.github.io/obsidian-typings/">

	<script>
        const base = "https://obsidian-typings.github.io/obsidian-typings/";
        let rest = window.location.pathname.replace("/obsidian-typings/", "");
        if (rest.startsWith("/")) {
            rest = rest.substring(1);
        }
        window.location.replace(base + rest + window.location.search + window.location.hash);
	</script>
</head>
<body>
<p>This repository has moved. <a href="https://obsidian-typings.github.io/obsidian-typings/">Click here to go to the new location.</a></p>
</body>
</html>
